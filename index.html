      "@context": "https://schema.org",

    <!-- Structured Data - WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Jukel",
      "url": "https://jukel.com"
    }

    <!-- Structured Data - ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Jukel",
      "url": "https://jukel.com",
      "description": "AWS Cloud Solutions Partner offering cloud migration, managed services, security, DevOps, and cost optimization.",
      "priceRange": "$$",
      "areaServed": { "@type": "Place", "name": "Worldwide" },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Cloud Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cloud Migration" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cloud Managed Services" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cloud Security" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cloud DevOps" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cloud Cost Optimization" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Cloud-Native Development" } }
        ]
      }
    }
    </script>

    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What AWS services does Jukel specialize in?",
          "acceptedAnswer": { "@type": "Answer", "text": "We specialize in EC2, S3, RDS, Lambda, CloudFront, EKS, and many more. Our team holds multiple AWS certifications and can handle any AWS service requirement." }
        },
        {
          "@type": "Question",
          "name": "How long does a typical cloud migration take?",
          "acceptedAnswer": { "@type": "Answer", "text": "Migration timelines vary based on complexity, but most projects are completed within 4-12 weeks. We provide a detailed timeline after our initial assessment." }
        },
        {
          "@type": "Question",
          "name": "Do you offer 24/7 support?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes, we provide round-the-clock monitoring and support with guaranteed response times based on your service level agreement." }
        },
        {
          "@type": "Question",
          "name": "Can you help reduce our current AWS costs?",
          "acceptedAnswer": { "@type": "Answer", "text": "Our cost optimization audits typically identify 20-40% savings through rightsizing, reserved instances, and architectural improvements." }
        },
        {
          "@type": "Question",
          "name": "What industries do you serve?",
          "acceptedAnswer": { "@type": "Answer", "text": "We serve fintech, healthcare, e-commerce, SaaS, media, and enterprise clients across the globe with tailored cloud solutions." }
        }
      ]
    }
    </script>
